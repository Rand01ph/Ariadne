name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── Extension (WXT → Chrome MV3 zip) ────────────────────────────────────────
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & zip extension
        run: pnpm --filter ariadne-extension zip

      - name: Collect zip
        run: |
          mkdir -p dist
          cp packages/extension/.output/*.zip dist/

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ariadne-chrome-mv3
          path: dist/
          if-no-files-found: error

  # ── Server (uv → wheel + sdist) ─────────────────────────────────────────────
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build server package
        working-directory: packages/server
        run: uv build

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ariadne-server-dist
          path: packages/server/dist/
          if-no-files-found: error

  # ── GitHub Release (tag pushes only) ────────────────────────────────────────
  release:
    needs: [build-extension, build-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download extension zip
        uses: actions/download-artifact@v4
        with:
          name: ariadne-chrome-mv3
          path: dist/

      - name: Download server wheel
        uses: actions/download-artifact@v4
        with:
          name: ariadne-server-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            ### Chrome Extension
            1. Download `ariadne-extension-*-chrome.zip`
            2. Unzip it
            3. Open Chrome → `chrome://extensions` → Enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder

            ### Gateway Server
            ```bash
            # Install (once)
            uv tool install ariadne_server-*.whl

            # Start
            ariadne-server

            # Get API token
            ariadne-server token
            ```
