[project]
name = "ariadne-server"
version = "0.1.0"
description = "Ariadne Gateway Server - bridges remote AI agents to local browser"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "fastapi[standard]>=0.115.0",
  "pydantic-settings>=2.6.0",
]

[project.scripts]
ariadne-server = "ariadne_server.cli:main"

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.24.0",
  "httpx>=0.28.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ariadne_server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
